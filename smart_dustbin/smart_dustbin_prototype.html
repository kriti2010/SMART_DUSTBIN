<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dustbin - Advanced Interaction</title>
    <style>
        :root {
            --bg-main: #0a0f1d;
            --panel-bg: rgba(16, 23, 42, 0.85);
            --panel-border: rgba(139, 92, 246, 0.4);
            --text-primary: #e2e8f0;
            --text-accent: #a78bfa;
            --btn-bg: rgba(139, 92, 246, 0.15);
            --btn-hover: rgba(139, 92, 246, 0.4);
            --neon-glow: 0 0 15px rgba(139, 92, 246, 0.6);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --font-family: 'Orbitron', 'Inter', -apple-system, sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-family);
            background-image: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-main) 100%);
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@400;500;600&display=swap');

        #canvas-container {
            position: absolute;
            top: 0;
            left: 350px;
            width: calc(100vw - 350px);
            height: 100vh;
            z-index: 1;
        }

        /* Sidebar UI */
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--panel-border);
            box-shadow: 10px 0 40px rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            margin: 0 0 0.5rem 0;
            color: #fff;
            text-shadow: var(--neon-glow);
            letter-spacing: 2px;
        }
        .header p {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: var(--text-accent);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .panel-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .panel-section h3 {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 1rem 0;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        button {
            width: 100%;
            background: var(--btn-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:last-child { margin-bottom: 0; }
        button:hover {
            background: var(--btn-hover);
            transform: translateX(5px);
            box-shadow: var(--neon-glow);
            border-color: var(--text-accent);
        }
        button.primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            border: none;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            font-weight: 600;
        }
        button.primary:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8);
        }

        /* Smart Log Panel */
        #log-panel {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            font-family: 'Inter', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #8b5cf6;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 3px; }

        /* Interactive HTML Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px 16px;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.9) translate(15px, 15px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), var(--neon-glow);
            z-index: 100;
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-width: 200px;
        }
        #tooltip.show {
            opacity: 1;
            transform: scale(1) translate(15px, 15px);
        }
        #tooltip .tt-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 4px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        #tooltip .tt-type {
            font-size: 0.75rem;
            color: var(--text-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #tooltip .tt-desc {
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.4;
        }

        /* Loading Screen */
        #loader {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-main);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.8s ease;
        }
        .loader-ring {
            width: 60px; height: 60px;
            border: 3px solid transparent;
            border-top-color: #8b5cf6; border-right-color: #ec4899;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="loader-ring"></div>
        <h2 style="font-family: 'Orbitron', sans-serif; color: #fff; letter-spacing: 2px;">INITIALIZING SYSTEM...</h2>
    </div>

    <!-- Interactive Tooltip -->
    <div id="tooltip">
        <div class="tt-name" id="tt-name">Component</div>
        <div class="tt-type" id="tt-type">Type</div>
        <div class="tt-desc" id="tt-desc">Description goes here...</div>
    </div>

    <div id="sidebar">
        <div class="header">
            <h1>SMART BIN</h1>
            <p>Campus Ready AI</p>
        </div>

        <div class="panel-section">
            <h3>Process Simulation</h3>
            <button class="primary" onclick="simulateWaste('food')">🍎 Simulate Food Waste</button>
            <button class="primary" onclick="simulateWaste('bottle')">🧴 Simulate Plastic Bottle</button>
            <button class="primary" onclick="simulateWaste('paper')">📄 Simulate Paper Waste</button>
            <button class="primary" onclick="simulateWaste('can')">🥫 Simulate Metal Can</button>
            <button class="primary" onclick="simulateWaste('hazard')">🔋 Simulate Battery</button>
        </div>

        <div class="panel-section">
            <h3>Visual Diagnostics</h3>
            <button onclick="setViewMode('default')">📐 Standard View</button>
            <button onclick="setViewMode('transparent')">🔍 X-Ray Shell</button>
            <button onclick="setViewMode('exploded')">💥 Exploded Layers</button>
        </div>

        <div class="panel-section" style="flex-grow: 1; display: flex; flex-direction: column;">
            <h3>System Log</h3>
            <div id="log-panel">
                <div class="log-entry" style="border-color: #3b82f6;">System initialized and ready.</div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        function logMsg(msg, color="#8b5cf6") {
            const panel = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.borderColor = color;
            entry.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${msg}`;
            panel.prepend(entry);
        }

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const aspect = (window.innerWidth - 350) / window.innerHeight;
        const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
        camera.position.set(40, 30, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;
        controls.target.set(0, 15, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 50, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const softLight = new THREE.PointLight(0xffb6c1, 0.4, 100);
        softLight.position.set(-20, 20, -20);
        scene.add(softLight);

        // --- MATERIALS ---
        const bodyMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffb6c1, roughness: 0.1, metalness: 0.2, transparent: true, opacity: 1 
        });

        // Procedural Polka Dot Texture
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        
        // White background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1024, 1024);
        
        // Draw pink polka dots
        ctx.fillStyle = '#ffb6c1'; // Baby pink dots
        const dotRadius = 25;
        const spacing = 120;
        
        for (let y = 0; y <= 1024 + spacing; y += spacing) {
            for (let x = 0; x <= 1024 + spacing; x += spacing) {
                const offsetX = (y / spacing) % 2 === 0 ? 0 : spacing / 2;
                ctx.beginPath();
                ctx.arc(x + offsetX, y, dotRadius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping; 
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(2, 2); 
        texture.encoding = THREE.sRGBEncoding;
        bodyMaterial.map = texture;
        bodyMaterial.needsUpdate = true;

        // Procedural Lid Texture (Solid Grey)
        const lidCanvas = document.createElement('canvas');
        lidCanvas.width = 1024; lidCanvas.height = 1024;
        const lctx = lidCanvas.getContext('2d');
        lctx.fillStyle = '#808080'; // Grey
        lctx.fillRect(0, 0, 1024, 1024);
        
        const lidTexture = new THREE.CanvasTexture(lidCanvas);
        lidTexture.wrapS = THREE.RepeatWrapping; 
        lidTexture.wrapT = THREE.RepeatWrapping;
        lidTexture.repeat.set(2, 2); 
        lidTexture.encoding = THREE.sRGBEncoding;
        const lidMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, roughness: 0.2, metalness: 0.1, map: lidTexture 
        });

        const mat = {
            dark: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.2 }),
            metal: new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 }),
            pcb: new THREE.MeshStandardMaterial({ color: 0x006600, roughness: 0.8 }),
            copper: new THREE.MeshStandardMaterial({ color: 0xb87333, roughness: 0.3, metalness: 0.9 }),
            blue: new THREE.MeshStandardMaterial({ color: 0x2563eb }),
            red: new THREE.MeshStandardMaterial({ color: 0xdc2626 }),
            transShell: bodyMaterial.clone(),
            wet: new THREE.MeshStandardMaterial({ color: 0x10b981 }), // Green
            dry: new THREE.MeshStandardMaterial({ color: 0x3b82f6 }), // Blue
            recycle: new THREE.MeshStandardMaterial({ color: 0xf59e0b }), // Yellow
            hazard: new THREE.MeshStandardMaterial({ color: 0xef4444 }), // Red
        };
        mat.transShell.opacity = 0.2;
        mat.transShell.depthWrite = false;

        // --- INTERACTIVE SYSTEM ---
        const interactables = [];
        const tooltip = document.getElementById('tooltip');
        const ttName = document.getElementById('tt-name');
        const ttType = document.getElementById('tt-type');
        const ttDesc = document.getElementById('tt-desc');
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredObject = null;
        let originalEmissive = new THREE.Color(0x000000);

        function registerInteractable(mesh, name, type, desc) {
            mesh.userData = { name, type, desc, isInteractable: true };
            interactables.push(mesh);
        }

        window.addEventListener('mousemove', (event) => {
            const sidebarWidth = 350;
            if (event.clientX < sidebarWidth) {
                tooltip.classList.remove('show');
                if(hoveredObject) {
                    hoveredObject.material.emissive.copy(originalEmissive);
                    hoveredObject = null;
                }
                return;
            }

            mouse.x = ((event.clientX - sidebarWidth) / (window.innerWidth - sidebarWidth)) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            tooltip.style.left = event.clientX + 'px';
            tooltip.style.top = event.clientY + 'px';

            raycaster.setFromCamera(mouse, camera);
            // Don't raycast shell if it's opaque and hiding internals
            let targets = interactables;
            if (state.viewMode === 'default') {
                // If default view, only shell and external things are hoverable
                targets = interactables.filter(i => i.userData.isExternal || i.userData.isLid);
            }

            const intersects = raycaster.intersectObjects(targets, false);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                if (hoveredObject !== object) {
                    if (hoveredObject) hoveredObject.material.emissive.copy(originalEmissive);
                    
                    hoveredObject = object;
                    // Clone material to avoid glowing all instances
                    if(!object.material.isCloned) {
                        object.material = object.material.clone();
                        object.material.isCloned = true;
                    }
                    originalEmissive.copy(object.material.emissive);
                    object.material.emissive.setHex(0x444444); // Glow effect
                    
                    ttName.textContent = object.userData.name;
                    ttType.textContent = object.userData.type;
                    ttDesc.textContent = object.userData.desc;
                    tooltip.classList.add('show');
                }
            } else {
                if (hoveredObject) {
                    hoveredObject.material.emissive.copy(originalEmissive);
                    hoveredObject = null;
                    tooltip.classList.remove('show');
                }
            }
        });

        // --- MODEL CONSTRUCTION ---
        const entireBin = new THREE.Group(); scene.add(entireBin);
        const outerGroup = new THREE.Group(); entireBin.add(outerGroup);
        const internalGroup = new THREE.Group(); entireBin.add(internalGroup);
        const baseGroup = new THREE.Group(); entireBin.add(baseGroup);
        const compGroup = new THREE.Group(); entireBin.add(compGroup);
        const lidGroup = new THREE.Group(); entireBin.add(lidGroup);
        lidGroup.position.set(0, 22.5, -8.5);

        // Shell
        const shellMesh = new THREE.Mesh(new THREE.CylinderGeometry(9, 8, 22, 64, 1, true), bodyMaterial);
        shellMesh.position.y = 12; shellMesh.castShadow = true;
        outerGroup.add(shellMesh);
        registerInteractable(shellMesh, "Flower Body", "Enclosure", "Premium glossy baby pink outer casing protecting internal components.");
        shellMesh.userData.isExternal = true;

        // Base
        const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(8.5, 8.5, 1, 64), mat.dark);
        baseMesh.position.y = 0.5;
        baseGroup.add(baseMesh);
        registerInteractable(baseMesh, "Base Unit", "Structure", "Houses the heavy power supply and provides structural stability.");
        baseMesh.userData.isExternal = true;

        // Battery
        const battery = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 3), mat.dark);
        battery.position.set(0, 1.5, 0);
        baseGroup.add(battery);
        registerInteractable(battery, "Lithium Power Unit", "Power", "Rechargeable high-capacity battery unit for smart campus grid.");

        // Compartments
        const cGeo = new THREE.CylinderGeometry(7.5, 7.5, 12, 32, 1, false, 0, Math.PI / 2);
        const comps = [
            { m: mat.wet, n: "Wet Waste", d: "Stores organic and food waste.", a: 0, c: "#10b981" },
            { m: mat.dry, n: "Dry Waste", d: "Stores paper and non-recyclables.", a: Math.PI/2, c: "#3b82f6" },
            { m: mat.recycle, n: "Recyclable", d: "Stores plastic and metal.", a: Math.PI, c: "#f59e0b" },
            { m: mat.hazard, n: "Hazardous", d: "Stores batteries and e-waste.", a: -Math.PI/2, c: "#ef4444" }
        ];
        const compMeshes = {};
        comps.forEach(c => {
            const m = new THREE.Mesh(cGeo, c.m);
            m.rotation.y = c.a; m.position.y = 7;
            compGroup.add(m);
            registerInteractable(m, c.n + " Bin", "Storage", c.d);
            compMeshes[c.n] = { angle: c.a, color: c.c };
            
            // Weight Sensor
            const w = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.2, 16), mat.metal);
            const ang = c.a + Math.PI/4;
            w.position.set(Math.cos(ang)*4, 1.2, Math.sin(ang)*4);
            compGroup.add(w);
            registerInteractable(w, "Weight Sensor", "Load Cell", `Monitors fill level of ${c.n} bin.`);
        });

        // Funnel
        const funnel = new THREE.Mesh(new THREE.CylinderGeometry(7, 2, 4, 32, 1, true), mat.metal);
        funnel.position.y = 19;
        internalGroup.add(funnel);
        registerInteractable(funnel, "Waste Pathway", "Mechanical", "Directs incoming waste past the sensory array.");

        // ESP32
        const pcb = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 4), mat.pcb);
        pcb.position.set(5, 21.5, 0);
        internalGroup.add(pcb);
        registerInteractable(pcb, "ESP32 Microcontroller", "Compute", "The brain of the smart bin. Runs AI classification models.");

        // Servo & Flap
        const servo = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 2.5), mat.blue);
        servo.position.set(0, 16.5, 0);
        internalGroup.add(servo);
        registerInteractable(servo, "High-Torque Servo", "Actuator", "Rotates the flap to the correct sorting angle.");

        const flapGroup = new THREE.Group(); flapGroup.position.copy(servo.position);
        internalGroup.add(flapGroup);
        const flap = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), mat.dark);
        flap.rotation.x = -Math.PI / 4; flap.position.set(0, -1, 2);
        flapGroup.add(flap);
        registerInteractable(flap, "Sorting Flap", "Mechanical", "Deflects waste into the analyzed target compartment.");

        // Sensors
        const sGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const moist = new THREE.Mesh(sGeo, mat.blue); moist.position.set(0, 19, -2.5);
        internalGroup.add(moist); registerInteractable(moist, "Moisture Sensor", "Capacitive", "Detects wet/organic matter content.");
        
        const metal = new THREE.Mesh(sGeo, mat.copper); metal.position.set(2.5, 18.5, 0);
        internalGroup.add(metal); registerInteractable(metal, "Metal Detector", "Inductive", "Detects aluminum cans and magnetic metals.");
        
        const optic = new THREE.Mesh(sGeo, mat.red); optic.position.set(-2.5, 19.5, 0);
        internalGroup.add(optic); registerInteractable(optic, "Optical Spectrometer", "Infrared", "Analyzes material composition (plastics/paper).");

        // Lid & Top Sensors
        const lidMesh = new THREE.Mesh(new THREE.CylinderGeometry(9, 9, 1, 64), lidMaterial);
        lidMesh.position.set(0, 0.5, 8.5); lidGroup.add(lidMesh);
        registerInteractable(lidMesh, "Automatic Lid", "Enclosure", "Touchless entry to ensure hygiene.");
        lidMesh.userData.isLid = true;

        const uGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16);
        const u1 = new THREE.Mesh(uGeo, mat.metal); u1.rotation.x=Math.PI/2; u1.position.set(-2, 1, 16.5);
        lidGroup.add(u1); registerInteractable(u1, "Ultrasonic Sensor L", "Proximity", "Detects approaching user hands.");
        u1.userData.isLid = true;

        const u2 = u1.clone(); u2.position.set(2, 1, 16.5);
        lidGroup.add(u2); registerInteractable(u2, "Ultrasonic Sensor R", "Proximity", "Secondary proximity detection.");
        u2.userData.isLid = true;

        const sensorGlow = new THREE.PointLight(0x00ffff, 0, 5);
        sensorGlow.position.set(0, 2, 17);
        lidGroup.add(sensorGlow);


        // --- GARBAGE SIMULATION LOGIC ---
        let state = { viewMode: 'default', isProcessing: false };

        function createGarbageMesh(type) {
            let mesh;
            if(type === 'food') {
                mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(1.2, 0), new THREE.MeshStandardMaterial({color: 0x8B4513}));
            } else if(type === 'bottle') {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 2, 16), new THREE.MeshStandardMaterial({color: 0x00aaff, transparent: true, opacity: 0.6}));
            } else if(type === 'paper') {
                const geo = new THREE.IcosahedronGeometry(1.2, 1);
                // randomize vertices a bit for crumpled look
                const pos = geo.attributes.position;
                for(let i=0; i<pos.count; i++) {
                    pos.setXYZ(i, pos.getX(i)*(0.8+Math.random()*0.4), pos.getY(i)*(0.8+Math.random()*0.4), pos.getZ(i)*(0.8+Math.random()*0.4));
                }
                geo.computeVertexNormals();
                mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            } else if(type === 'can') {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 2.5, 32), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9, roughness: 0.2}));
            } else if(type === 'hazard') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 1.2), new THREE.MeshStandardMaterial({color: 0xef4444}));
            }
            mesh.position.set(0, 32, 15); // Start above lid
            return mesh;
        }

        function simulateWaste(type) {
            if(state.isProcessing) return;
            state.isProcessing = true;
            
            // Map type to logic
            let targetBin, sensorFlash, sensorColor, logText;
            if(type === 'food') { targetBin = 'Wet Waste'; sensorFlash = moist; sensorColor = 0x00ff00; logText = 'Organic Food Waste detected. Routing to Wet Bin.'; }
            if(type === 'bottle') { targetBin = 'Recyclable'; sensorFlash = optic; sensorColor = 0x00ffff; logText = 'PET Plastic Bottle detected. Routing to Recyclable Bin.'; }
            if(type === 'paper') { targetBin = 'Dry Waste'; sensorFlash = optic; sensorColor = 0xffffff; logText = 'Paper Waste detected. Routing to Dry Bin.'; }
            if(type === 'can') { targetBin = 'Recyclable'; sensorFlash = metal; sensorColor = 0xffa500; logText = 'Aluminum Can detected. Routing to Recyclable Bin.'; }
            if(type === 'hazard') { targetBin = 'Hazardous'; sensorFlash = optic; sensorColor = 0xff0000; logText = 'Battery/Hazardous material detected! Routing to Secure Bin.'; }

            const binData = compMeshes[targetBin];
            logMsg(`Proximity alert. User approaching.`, '#ffffff');
            gsap.to(sensorGlow, { intensity: 2, duration: 0.2, yoyo: true, repeat: 3 });
            
            const garbage = createGarbageMesh(type);
            scene.add(garbage);

            const tl = gsap.timeline({
                onComplete: () => {
                    scene.remove(garbage);
                    state.isProcessing = false;
                    logMsg(`Sorting complete. Ready.`, '#10b981');
                }
            });

            // 1. Open lid
            tl.to(lidGroup.rotation, { x: -Math.PI/2.5, duration: 0.6, ease: "power2.out" })
            // 2. Drop garbage into funnel
              .to(garbage.position, { y: 19, z: 0, duration: 0.8, ease: "power2.in" })
              .call(() => {
                  logMsg(logText, binData.color);
                  // Flash specific sensor
                  sensorFlash.material = sensorFlash.material.clone();
                  sensorFlash.material.emissive.setHex(sensorColor);
                  gsap.to(sensorFlash.material.emissive, {r:0,g:0,b:0, duration: 1, delay: 0.2});
              })
            // 3. Close lid while rotating flap
              .to(lidGroup.rotation, { x: 0, duration: 0.6 }, "+=0.2")
              .to(flapGroup.rotation, { y: binData.angle, duration: 0.5 }, "<")
            // 4. Drop into bin
              .to(garbage.position, { 
                  y: 5, 
                  x: Math.sin(binData.angle) * 4, 
                  z: Math.cos(binData.angle) * 4, 
                  duration: 0.6, 
                  ease: "power2.in" 
              })
            // 5. Reset flap
              .to(flapGroup.rotation, { y: 0, duration: 0.5, delay: 0.2 });
        }


        // --- VIEW MODES ---
        function setViewMode(mode) {
            state.viewMode = mode;
            if (mode === 'default') {
                shellMesh.material = bodyMaterial;
                gsap.to(outerGroup.position, {y: 0, duration: 1});
                gsap.to(lidGroup.position, {y: 22.5, duration: 1});
                gsap.to(internalGroup.position, {y: 0, duration: 1});
                gsap.to(compGroup.position, {y: 0, duration: 1});
                logMsg('Switched to Standard Presentation View.', '#ffffff');
            } else if (mode === 'transparent') {
                shellMesh.material = mat.transShell;
                gsap.to(outerGroup.position, {y: 0, duration: 1});
                gsap.to(lidGroup.position, {y: 22.5, duration: 1});
                gsap.to(internalGroup.position, {y: 0, duration: 1});
                gsap.to(compGroup.position, {y: 0, duration: 1});
                logMsg('X-Ray Shell enabled. Hover over components to identify.', '#3b82f6');
            } else if (mode === 'exploded') {
                shellMesh.material = mat.transShell;
                gsap.to(lidGroup.position, {y: 35, duration: 1.5, ease: "power2.out"});
                gsap.to(outerGroup.position, {y: 10, duration: 1.5, ease: "power2.out"});
                gsap.to(internalGroup.position, {y: 5, duration: 1.5, ease: "power2.out"});
                gsap.to(compGroup.position, {y: -5, duration: 1.5, ease: "power2.out"});
                logMsg('Exploded structural view active.', '#f59e0b');
            }
        }

        // Remove Loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 1000);
        });

        window.addEventListener('resize', () => {
            const width = window.innerWidth - 350;
            camera.aspect = width / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(width, window.innerHeight);
        });

        // Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
